repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
  
  - repo: local
    hooks:
      - id: openclaw-security-check
        name: OpenClaw Security Check
        entry: ./security/openclaw-security-check.sh
        language: script
        files: '.*\.(json|md|js|ts|py|env)$'
